<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            margin-bottom: 20px;
        }
        a {
            text-decoration: none;
            color: white;
            background: #4facfe;
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.3s;
        }
        a:hover {
            background: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to My GitHub Page</h1>
        <p>This site is hosted using GitHub Pages.</p>
        <a href="https://github.com/">Visit GitHub</a>
    </div>
</body>
</html>
